info:
  name: POST api-v1-auth-register
  type: http

http:
  method: POST
  url: "{{url}}/api/v1/auth/register"
  body:
    type: json
    data: |-
      {
        "username": "demo",
        "email": "demo@demo.com",
        "password": "password@demo",
        firstName : "demo"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
