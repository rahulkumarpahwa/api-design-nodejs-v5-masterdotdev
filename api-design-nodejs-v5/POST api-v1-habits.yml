info:
  name: POST api-v1-habits
  type: http
  seq: 1

http:
  method: POST
  url: '{{url}}/api/v1/habits/'
  body:
    type: json
    data: |-
      {
          "name" : "Stretch 2",
          "frequency" : "daily",
          "targetCount" : 30
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
